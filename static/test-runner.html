<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Runner</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: monospace; font-size: 13px; background: #1e1e1e; color: #d4d4d4; }
    body { display: flex; flex-direction: column; }
    #header { padding: 10px 16px; background: #2d2d2d; border-bottom: 1px solid #444; display: flex; gap: 12px; align-items: center; }
    #header h1 { margin: 0; font-size: 14px; color: #9cdcfe; }
    #header button { padding: 4px 10px; background: #3a3a3a; color: #d4d4d4; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
    #header button:hover { background: #4a4a4a; }
    #test-output { flex: 1; overflow: auto; padding: 12px 16px; }

    .summary        { padding: 6px 10px; border-radius: 4px; margin-bottom: 16px; font-weight: bold; }
    .summary.pass   { background: #1e3a1e; color: #4ec94e; border: 1px solid #2a5a2a; }
    .summary.fail   { background: #3a1e1e; color: #f47c7c; border: 1px solid #5a2a2a; }

    .suite          { margin-bottom: 10px; }
    .suite-name     { color: #569cd6; font-weight: bold; padding: 4px 0; }
    .test-row       { padding: 2px 0; display: flex; flex-direction: column; }
    .test-name      { color: #d4d4d4; }
    .badge          { display: inline-block; width: 16px; font-size: 11px; }
    .badge.pass     { color: #4ec94e; }
    .badge.fail     { color: #f47c7c; }
    .error-msg      { color: #f47c7c; font-size: 11px; padding: 2px 0 4px; white-space: pre-wrap; }

    #loading        { color: #888; padding: 8px; }
  </style>
</head>
<body>

<div id="header">
  <h1>Test Runner</h1>
  <button id="btn-run">Run all</button>
</div>
<div id="test-output"><div id="loading">Click "Run all" to execute tests.</div></div>

<!-- Source dependencies (constants must load first) -->
<script src="js/eventlog/constants.js"></script>
<script src="js/eventlog/event-log.js"></script>
<script src="js/eventlog/xes-parser.js"></script>
<script src="js/eventlog/log-util.js"></script>
<script src="js/pnv/model.js"></script>
<script src="js/discovery/alpha-miner.js"></script>
<script src="js/discovery/inductive-miner.js"></script>
<script src="js/eventlog/dtlog.js"></script>
<script src="js/conformance/footprint.js"></script>

<!-- Test runner -->
<script src="test/runner.js"></script>

<!-- Inline XES fixtures (avoids fetch dependency) -->
<script src="test/fixtures/running-example-xes.js"></script>

<!-- Test suites -->
<script src="test/eventlog/test-event-log.js"></script>
<script src="test/eventlog/test-xes-parser.js"></script>
<script src="test/eventlog/test-log-util.js"></script>
<script src="test/discovery/test-alpha-miner.js"></script>
<script src="test/discovery/test-inductive-miner.js"></script>
<script src="test/conformance/test-footprint.js"></script>
<script src="test/eventlog/test-dtlog.js"></script>

<script>
  document.getElementById('btn-run').addEventListener('click', async () => {
    const out = document.getElementById('test-output');
    out.innerHTML = '<div id="loading">Running…</div>';
    await new Promise(r => setTimeout(r, 0));  // let the DOM repaint
    out.innerHTML = '';
    await runTests(out);
  });
</script>
</body>
</html>
