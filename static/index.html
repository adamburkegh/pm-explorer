<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PM Explorer</title>
  <link rel="stylesheet" href="js/lib/bpmn-js/assets/diagram-js.css">
  <link rel="stylesheet" href="js/lib/bpmn-js/assets/bpmn-js.css">
  <link rel="stylesheet" href="js/lib/bpmn-js/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; flex-direction: column;
      background: #1e1e1e; color: #d4d4d4;
      font-family: sans-serif; font-size: 13px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    #header {
      background: #2d2d2d;
      border-bottom: 1px solid #444;
      padding: 0 12px;
      min-height: 42px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    #logo {
      font-weight: bold; font-size: 14px; color: #9cdcfe;
      padding-right: 12px; border-right: 1px solid #444; margin-right: 4px;
    }

    /* Main tab navigation */
    #tabs { display: flex; gap: 0; }
    #tabs button {
      padding: 5px 14px; background: transparent; color: #aaa;
      border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-size: 13px; white-space: nowrap;
    }
    #tabs button:hover { color: #d4d4d4; }
    #tabs button.active { color: #9cdcfe; border-bottom-color: #4682b4; }

    /* File controls (right side) */
    #file-controls {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
    }
    button {
      padding: 4px 10px; cursor: pointer;
      background: #3a3a3a; color: #d4d4d4;
      border: 1px solid #555; border-radius: 3px;
    }
    button:hover { background: #4a4a4a; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:disabled:hover { background: #3a3a3a; }

    #drop-zone {
      border: 1px dashed #555; border-radius: 3px;
      padding: 4px 10px; color: #666; font-size: 12px;
      cursor: default; white-space: nowrap; user-select: none;
    }
    #drop-zone.over { border-color: #9cdcfe; color: #9cdcfe; }

    #log-badge {
      font-size: 11px; color: #777; white-space: nowrap;
      padding-left: 10px; border-left: 1px solid #444;
      max-width: 280px; overflow: hidden; text-overflow: ellipsis;
    }

    #backend-status {
      font-size: 11px; white-space: nowrap;
      padding-left: 10px; border-left: 1px solid #444;
      display: flex; align-items: center; gap: 4px;
    }
    #backend-status::before { content: '●'; font-size: 8px; }
    #backend-status.connected    { color: #4ec94e; }
    #backend-status.disconnected { color: #555; }

    /* ── Content + panels ──────────────────────────────────────────────────── */
    #content { flex: 1; position: relative; overflow: hidden; }

    .panel {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
    }
    .hidden { display: none; }
    .panel.hidden { display: none !important; }

    /* ── Log panel ─────────────────────────────────────────────────────────── */
    #panel-log {
      overflow-y: auto;
      padding: 12px 16px;
      font-family: monospace; font-size: 13px;
    }
    #panel-log .section { margin-bottom: 20px; }
    #panel-log .section h3 {
      margin: 0 0 6px; color: #569cd6; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #panel-log table { border-collapse: collapse; width: 100%; }
    #panel-log th, #panel-log td {
      border: 1px solid #3a3a3a; padding: 3px 8px; text-align: left;
    }
    #panel-log th { background: #2d2d2d; color: #9cdcfe; }
    #panel-log tr:nth-child(even) { background: #252525; }
    #panel-log .kv {
      display: grid; grid-template-columns: max-content 1fr; gap: 2px 16px;
    }
    #panel-log .kv span:nth-child(odd)  { color: #9cdcfe; }
    #panel-log .kv span:nth-child(even) { color: #ce9178; }
    #panel-log .bar {
      display: inline-block; background: #264f78;
      height: 10px; vertical-align: middle; margin-left: 6px;
    }
    #log-placeholder { color: #555; padding: 20px; }

    /* ── Canvas-panel chrome ───────────────────────────────────────────────── */
    .panel-toolbar {
      padding: 5px 10px; background: #2d2d2d; border-bottom: 1px solid #444;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .panel-toolbar .spacer { margin-left: auto; }
    .panel-toolbar .info { font-size: 11px; color: #666; }

    /* Example-selector tabs (used inside PNV panel toolbar) */
    .ex-tabs { display: flex; }
    .ex-tabs button {
      padding: 3px 10px; border-radius: 0; border: 1px solid #555; font-size: 12px;
    }
    .ex-tabs button:first-child  { border-radius: 3px 0 0 3px; }
    .ex-tabs button:last-child   { border-radius: 0 3px 3px 0; }
    .ex-tabs button + button     { border-left: none; }
    .ex-tabs button.active { background: #4682b4; color: #fff; border-color: #4682b4; }

    .view-source-bar {
      padding: 2px 10px; font-size: 10px; color: #888;
      background: #f0f0f0; border-bottom: 1px solid #ddd; flex-shrink: 0;
    }

    /* Canvas host */
    .canvas-area {
      flex: 1; position: relative; overflow: hidden; background: #fff;
    }
    .canvas-area canvas {
      display: block; width: 100%; height: 100%; cursor: grab;
    }
    .canvas-area canvas:active { cursor: grabbing; }

    /* ── Conformance panel ─────────────────────────────────────────────────── */
    #conf-content {
      flex: 1; overflow-y: auto; padding: 20px;
    }
    .conf-message { color: #777; }
    #conf-content table { border-collapse: collapse; }
    #conf-content th, #conf-content td {
      border: 1px solid #3a3a3a; padding: 4px 12px; text-align: left;
    }
    #conf-content th { background: #2d2d2d; color: #9cdcfe; }
    #conf-content tr:nth-child(even) { background: #252525; }
    #conf-content td:last-child { font-family: monospace; color: #9cdcfe; }
    #conf-content tr.conf-section td {
      background: #2d2d2d; color: #888; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 3px 12px; border-bottom: none;
    }
    #conf-content tr.conf-dim td { color: #555; }
    #conf-content tr.conf-dim td:last-child { color: #555; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div id="header">
  <span id="logo">PM Explorer</span>

  <nav id="tabs">
    <button data-tab="log"   class="active">Log</button>
    <button data-tab="alpha">Alpha Miner</button>
    <button data-tab="im">Inductive Miner</button>
    <button data-tab="conformance">Conformance</button>
  </nav>

  <div id="file-controls">
    <button id="btn-example">Load example</button>
    <button id="btn-browse">Browse…</button>
    <input id="file-input" type="file" accept=".xes" style="display:none">
    <div id="drop-zone">or drop XES here</div>
  </div>
  <span id="log-badge"></span>
  <span id="backend-status" class="disconnected" title="Backend not reachable">backend</span>
</div>

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<div id="content">

  <!-- Log panel -->
  <div id="panel-log" class="panel">
    <div id="log-placeholder">Load an XES file to begin.</div>
  </div>

  <!-- Alpha Miner panel -->
  <div id="panel-alpha" class="panel hidden">
    <div class="panel-toolbar">
      <span id="alpha-status" class="info">Load a log and switch to this tab to discover a model.</span>
      <span class="spacer"></span>
      <span id="alpha-stats" class="info"></span>
      <button id="btn-alpha-fit">Fit view</button>
      <button id="btn-alpha-reset">Reset marking</button>
      <button id="btn-alpha-tokens">Tokens: off</button>
      <button id="btn-alpha-export-pnml" disabled>Export PNML</button>
    </div>
    <div class="canvas-area">
      <canvas id="alpha-canvas"></canvas>
    </div>
  </div>

  <!-- Inductive Miner panel -->
  <div id="panel-im" class="panel hidden">
    <div class="panel-toolbar">
      <span id="im-status" class="info">Load a log and switch to this tab to discover a model.</span>
      <div class="ex-tabs" id="im-view-tabs">
        <button data-view="petri" class="active">Petri net</button>
        <button data-view="bpmn">BPMN</button>
        <button data-view="tree" disabled>Process tree</button>
      </div>
      <span class="spacer"></span>
      <span id="im-stats" class="info"></span>
      <button id="btn-im-fit">Fit view</button>
      <button id="btn-im-reset">Reset marking</button>
      <button id="btn-im-tokens">Tokens: off</button>
      <button id="btn-im-export-pnml" disabled>Export PNML</button>
      <button id="btn-im-export-bpmn" disabled>Export BPMN</button>
    </div>
    <div id="im-view-source" class="view-source-bar">Petri net &middot; computed locally</div>
    <div class="canvas-area" id="im-petri-area">
      <canvas id="im-canvas"></canvas>
    </div>
    <div class="canvas-area hidden" id="im-bpmn-area"></div>
    <div class="canvas-area hidden" id="im-tree-area"></div>
  </div>

  <!-- Conformance panel -->
  <div id="panel-conformance" class="panel hidden">
    <div class="panel-toolbar">
      <span class="info">Source:</span>
      <div class="ex-tabs" id="conf-source-tabs">
        <button data-src="alpha">Alpha Miner</button>
        <button data-src="im" class="active">Inductive Miner</button>
      </div>
      <button id="btn-run-conformance">Run</button>
      <span class="spacer"></span>
      <span id="conf-toolbar-status" class="info"></span>
    </div>
    <div id="conf-content">
      <div class="conf-message">Load a log and discover a model to check conformance.</div>
    </div>
  </div>

</div><!-- #content -->

<!-- ── JS dependencies ─────────────────────────────────────────────────────── -->
<script src="js/eventlog/constants.js"></script>
<script src="js/eventlog/event-log.js"></script>
<script src="js/eventlog/xes-parser.js"></script>
<script src="js/eventlog/log-util.js"></script>
<script src="js/pnv/model.js"></script>
<script src="js/pnv/renderer.js"></script>
<script src="js/pnv/viewer.js"></script>
<script src="js/pnv/pnml-export.js"></script>
<script src="js/discovery/alpha-miner.js"></script>
<script src="js/discovery/inductive-miner.js"></script>
<script src="js/lib/bpmn-js/bpmn-navigated-viewer.production.min.js"></script>
<!-- Bundled example log (avoids fetch dependency under file://) -->
<script src="test/fixtures/running-example-xes.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Shared state
// ═══════════════════════════════════════════════════════════════════════════

let _log      = null;   // EventLog | null
let _logName  = null;   // string   | null
let _logFile  = null;   // File | Blob | null  — kept for backend POSTs
let _logEpoch = 0;      // incremented each time a new log is loaded

let _alphaEpoch   = -1;   // _logEpoch value of the last alpha run
let _alphaTokens  = null; // Map<placeId, number> initial token snapshot

let _imEpoch      = -1;   // _logEpoch value of the last IM run
let _imTokens     = null; // Map<placeId, number> initial token snapshot
let _imBpmnEpoch      = -1;   // _logEpoch value of the last BPMN fetch
let _imBpmnSimplicity = null; // {nodes, constructs} from last BPMN fetch, or null
let _imBpmnXml        = null; // raw BPMN XML string from last fetch, for export
let _imView           = 'petri'; // 'petri' | 'bpmn'
let _imBpmnViewer     = null; // bpmn-js NavigatedViewer instance

let _backendConnected = false;
let _confSource       = 'im';  // 'alpha' | 'im'

// ═══════════════════════════════════════════════════════════════════════════
// Tab system
// ═══════════════════════════════════════════════════════════════════════════

function switchTab(tab) {
  // Show/hide panels
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('hidden', p.id !== `panel-${tab}`)
  );
  // Update tab buttons
  document.querySelectorAll('#tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );

  // Panel-specific activation
  if (tab === 'alpha') {
    if (_log && _alphaEpoch !== _logEpoch) {
      runAlpha();                // auto-discover when log has changed
    } else {
      alphaViewer.fitView();    // just re-fit if already computed
    }
  }
  if (tab === 'im') {
    if (_log && _imEpoch !== _logEpoch) {
      runInductive();            // auto-discover when log has changed
    } else {
      imViewer.fitView();
    }
  }
  if (tab === 'log' && _log) {
    renderLog(_log);
  }
  if (tab === 'conformance') {
    updateConformanceReady();
  }
}

document.querySelectorAll('#tabs button').forEach(btn =>
  btn.addEventListener('click', () => switchTab(btn.dataset.tab))
);

// ═══════════════════════════════════════════════════════════════════════════
// XES file loading
// ═══════════════════════════════════════════════════════════════════════════

function onLogLoaded(log, name) {
  _log      = log;
  _logName  = name;
  _logEpoch++;

  // Update header badge
  const sum = getLogSummary(log, log.activityKey);
  document.getElementById('log-badge').textContent =
    `${name}  ·  ${sum.traces} traces  ·  ${sum.activities} acts  ·  ${sum.variants} variants`;

  _imBpmnSimplicity = null;
  _imBpmnXml = null;
  document.getElementById('btn-im-export-bpmn').disabled = true;
  setConfContent('<div class="conf-message">Load a log and discover a model to check conformance.</div>');
  updateConformanceReady();

  // Refresh whichever panel is currently visible
  const active = document.querySelector('#tabs button.active')?.dataset.tab;
  if (active === 'log')   renderLog(log);
  if (active === 'alpha') runAlpha();
  if (active === 'im')    runInductive();
}

async function loadXes(source) {
  const badge = document.getElementById('log-badge');
  badge.textContent = 'Parsing…';
  try {
    let log, name;
    if (source === 'example') {
      log  = xesParser.parse(RUNNING_EXAMPLE_XES);
      name = 'running_example.xes';
      _logFile = new Blob([RUNNING_EXAMPLE_XES], { type: 'application/xml' });
    } else if (typeof source === 'string') {
      const resp = await fetch(source);
      const text = await resp.text();
      _logFile = new Blob([text], { type: 'application/xml' });
      log  = xesParser.parse(text);
      name = source.split('/').pop();
    } else {
      log  = await xesParser.parseFile(source);
      _logFile = source;
      name = source.name;
    }
    onLogLoaded(log, name);
  } catch (e) {
    badge.textContent = `Error: ${e.message}`;
    console.error(e);
  }
}

document.getElementById('btn-example').addEventListener('click',
  () => loadXes('example'));

document.getElementById('btn-browse').addEventListener('click',
  () => document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadXes(e.target.files[0]);
  e.target.value = '';
});

const _dz = document.getElementById('drop-zone');
_dz.addEventListener('dragover', e => { e.preventDefault(); _dz.classList.add('over'); });
_dz.addEventListener('dragleave', () => _dz.classList.remove('over'));
_dz.addEventListener('drop', e => {
  e.preventDefault();
  _dz.classList.remove('over');
  if (e.dataTransfer.files[0]) loadXes(e.dataTransfer.files[0]);
});

// ═══════════════════════════════════════════════════════════════════════════
// Log panel
// ═══════════════════════════════════════════════════════════════════════════

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  for (const c of children) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function renderLog(log) {
  const panel  = document.getElementById('panel-log');
  const actKey = log.activityKey;
  const tsKey  = log.timestampKey;
  const summary  = getLogSummary(log, actKey);
  const variants = getVariantsSortedByCount(getUVCL(log, actKey));
  const dfg      = getDFG(log, { activityKey: actKey });
  const startActs = getStartActivities(log, actKey);
  const endActs   = getEndActivities(log, actKey);

  panel.innerHTML = '';

  // ── Summary ────────────────────────────────────────────────────────────
  const sec1 = h('div', { class: 'section' }, h('h3', {}, 'Log summary'));
  const kv = h('div', { class: 'kv' });
  for (const [k, v] of [
    ['Traces',               summary.traces],
    ['Events',               summary.events],
    ['Activities',           summary.activities],
    ['Variants',             summary.variants],
    ['Avg trace length',     summary.avgTraceLength],
    ['Median trace length',  summary.medianTraceLength],
    ['Activity key',         actKey],
    ['Case-ID key',          log.caseIdKey],
  ]) {
    kv.append(h('span', {}, k), h('span', {}, String(v)));
  }
  sec1.append(kv);
  panel.append(sec1);

  // ── Classifiers ────────────────────────────────────────────────────────
  if (Object.keys(log.classifiers).length > 0) {
    const sec = h('div', { class: 'section' }, h('h3', {}, 'Classifiers'));
    const kv2 = h('div', { class: 'kv' });
    for (const [name, keys] of Object.entries(log.classifiers)) {
      kv2.append(h('span', {}, name), h('span', {}, keys.join(', ')));
    }
    sec.append(kv2);
    panel.append(sec);
  }

  // ── Variants ───────────────────────────────────────────────────────────
  const sec2 = h('div', { class: 'section' },
    h('h3', {}, `Variants (${variants.length})`));
  const tbl = h('table', {});
  tbl.append(h('tr', {}, h('th', {}, '#'), h('th', {}, 'Count'), h('th', {}, 'Activity sequence')));
  const maxCount = variants[0]?.[1] ?? 1;
  variants.forEach(([key, count], i) => {
    const acts  = variantKeyToArray(key).join(' → ');
    const bar   = h('span', { class: 'bar', style: `width:${Math.round(count / maxCount * 120)}px` });
    const cCell = h('td', {});
    cCell.append(document.createTextNode(count), bar);
    tbl.append(h('tr', {}, h('td', {}, String(i + 1)), cCell, h('td', {}, acts)));
  });
  sec2.append(tbl);
  panel.append(sec2);

  // ── DFG ────────────────────────────────────────────────────────────────
  const dfgEntries = Array.from(dfg.graph.entries())
    .sort((a, b) => b[1] - a[1]).slice(0, 30);
  const sec3 = h('div', { class: 'section' },
    h('h3', {}, `Directly-follows edges (top ${dfgEntries.length})`));
  const tbl2 = h('table', {});
  tbl2.append(h('tr', {}, h('th', {}, 'From'), h('th', {}, 'To'), h('th', {}, 'Count')));
  for (const [key, count] of dfgEntries) {
    const [a, b] = dfgKeyParts(key);
    tbl2.append(h('tr', {}, h('td', {}, a), h('td', {}, b), h('td', {}, String(count))));
  }
  sec3.append(tbl2);
  panel.append(sec3);

  // ── Start / End activities ─────────────────────────────────────────────
  const sec4 = h('div', { class: 'section' }, h('h3', {}, 'Start activities'));
  const kv3  = h('div', { class: 'kv' });
  for (const [act, count] of [...startActs.entries()].sort((a, b) => b[1] - a[1])) {
    kv3.append(h('span', {}, act), h('span', {}, String(count)));
  }
  sec4.append(kv3);
  panel.append(sec4);

  const sec5 = h('div', { class: 'section' }, h('h3', {}, 'End activities'));
  const kv4  = h('div', { class: 'kv' });
  for (const [act, count] of [...endActs.entries()].sort((a, b) => b[1] - a[1])) {
    kv4.append(h('span', {}, act), h('span', {}, String(count)));
  }
  sec5.append(kv4);
  panel.append(sec5);

  // ── Sample traces ──────────────────────────────────────────────────────
  const sec6 = h('div', { class: 'section' }, h('h3', {}, 'First 3 traces'));
  const tbl3 = h('table', {});
  tbl3.append(h('tr', {},
    h('th', {}, 'Case'), h('th', {}, 'Events'), h('th', {}, 'Activity sequence')));
  let shown = 0;
  for (const trace of log) {
    if (shown++ >= 3) break;
    const caseId = trace.attributes[log.caseIdKey] ?? '—';
    const acts   = getVariantFromTrace(trace, actKey).join(' → ');
    const ts0    = trace.at(0)?.get(tsKey);
    const tsStr  = ts0 instanceof Date ? ts0.toISOString().slice(0, 10) : '';
    tbl3.append(h('tr', {},
      h('td', {}, String(caseId)),
      h('td', {}, `${trace.length}${tsStr ? ' · ' + tsStr : ''}`),
      h('td', {}, acts)
    ));
  }
  sec6.append(tbl3);
  panel.append(sec6);
}

// ═══════════════════════════════════════════════════════════════════════════
// Alpha Miner panel
// ═══════════════════════════════════════════════════════════════════════════

const alphaViewer = new PetriNetViewer(document.getElementById('alpha-canvas'), {
  interactive: true,
  onFire: (_id, _t, net) => { net.updateEnabledTransitions(); alphaViewer.render(); },
});

/**
 * BFS layout: assigns x/y to all net nodes starting from sourceId,
 * producing a left-to-right layered graph.
 */
function layoutNet(net, sourceId) {
  const rank = new Map();
  const queue = [sourceId];
  rank.set(sourceId, 0);
  let head = 0;
  while (head < queue.length) {
    const nodeId = queue[head++];
    const r = rank.get(nodeId);
    for (const arc of net.arcs.values()) {
      if (arc.source === nodeId && !rank.has(arc.target)) {
        rank.set(arc.target, r + 1);
        queue.push(arc.target);
      }
    }
  }
  // Unreachable nodes get max+1
  const maxR = rank.size > 0 ? Math.max(...rank.values()) : 0;
  for (const id of [...net.places.keys(), ...net.transitions.keys()]) {
    if (!rank.has(id)) rank.set(id, maxR + 1);
  }

  const byRank = new Map();
  for (const [id, r] of rank) {
    if (!byRank.has(r)) byRank.set(r, []);
    byRank.get(r).push(id);
  }

  const X_GAP = 100, Y_GAP = 90;
  const maxCol = Math.max(...[...byRank.values()].map(ids => ids.length), 1);
  const totalH = maxCol * Y_GAP;

  for (const [r, ids] of byRank) {
    const groupH = ids.length * Y_GAP;
    const startY = (totalH - groupH) / 2 + Y_GAP / 2;
    ids.forEach((id, i) => {
      const node = net.places.get(id) || net.transitions.get(id);
      if (node) node.position = { x: 80 + r * X_GAP, y: startY + i * Y_GAP };
    });
  }
}

function runAlpha() {
  if (!_log) return;
  const result = applyAlphaMiner(_log);
  _alphaEpoch  = _logEpoch;

  layoutNet(result.net, result.source.id);
  result.net.updateEnabledTransitions();

  // Snapshot initial tokens for reset
  _alphaTokens = new Map(
    [...result.net.places.entries()].map(([id, p]) => [id, p.tokens])
  );

  alphaViewer.load(result.net);
  document.getElementById('btn-alpha-export-pnml').disabled = false;
  updateConformanceReady();

  document.getElementById('alpha-status').textContent = _logName ?? '';
  document.getElementById('alpha-stats').textContent =
    `${result.net.transitions.size} transitions · ` +
    `${result.net.places.size} places · ` +
    `${result.net.arcs.size} arcs`;
}

document.getElementById('btn-alpha-fit').addEventListener('click',
  () => alphaViewer.fitView());

document.getElementById('btn-alpha-tokens').addEventListener('click', function() {
  const show = !alphaViewer.renderer.showTokens;
  alphaViewer.setShowTokens(show);
  this.textContent = `Tokens: ${show ? 'on' : 'off'}`;
});

document.getElementById('btn-alpha-reset').addEventListener('click', () => {
  if (!_alphaTokens) return;
  for (const [id, tokens] of _alphaTokens) {
    const p = alphaViewer.net.places.get(id);
    if (p) p.tokens = tokens;
  }
  alphaViewer.net.updateEnabledTransitions();
  alphaViewer.render();
});

document.getElementById('btn-alpha-export-pnml').addEventListener('click', () => {
  if (!alphaViewer.net) return;
  const stem = (_logName ?? 'model').replace(/\.xes$/i, '');
  const xml = toPNML(alphaViewer.net, _alphaTokens, stem);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml], { type: 'application/xml' }));
  a.download = stem + '.pnml';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ═══════════════════════════════════════════════════════════════════════════
// Inductive Miner panel
// ═══════════════════════════════════════════════════════════════════════════

const imViewer = new PetriNetViewer(document.getElementById('im-canvas'), {
  interactive: true,
  onFire: (_id, _t, net) => { net.updateEnabledTransitions(); imViewer.render(); },
});

function runInductive() {
  if (!_log) return;
  const result = applyInductiveMiner(_log);
  _imEpoch = _logEpoch;

  layoutNet(result.net, result.source.id);
  result.net.updateEnabledTransitions();

  // Snapshot initial tokens for reset
  _imTokens = new Map(
    [...result.net.places.entries()].map(([id, p]) => [id, p.tokens])
  );

  imViewer.load(result.net);
  document.getElementById('btn-im-export-pnml').disabled = false;
  updateConformanceReady();

  document.getElementById('im-status').textContent = _logName ?? '';
  document.getElementById('im-stats').textContent =
    `${result.net.transitions.size} transitions · ` +
    `${result.net.places.size} places · ` +
    `${result.net.arcs.size} arcs`;
}

document.getElementById('btn-im-fit').addEventListener('click', () => {
  if (_imView === 'bpmn') _imBpmnViewer?.get('canvas').zoom('fit-viewport');
  else imViewer.fitView();
});

document.getElementById('btn-im-tokens').addEventListener('click', function() {
  const show = !imViewer.renderer.showTokens;
  imViewer.setShowTokens(show);
  this.textContent = `Tokens: ${show ? 'on' : 'off'}`;
});

document.getElementById('btn-im-reset').addEventListener('click', () => {
  if (!_imTokens) return;
  for (const [id, tokens] of _imTokens) {
    const p = imViewer.net.places.get(id);
    if (p) p.tokens = tokens;
  }
  imViewer.net.updateEnabledTransitions();
  imViewer.render();
});

document.getElementById('btn-im-export-pnml').addEventListener('click', () => {
  if (!imViewer.net) return;
  const stem = (_logName ?? 'model').replace(/\.xes$/i, '');
  const xml = toPNML(imViewer.net, _imTokens, stem);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml], { type: 'application/xml' }));
  a.download = stem + '.pnml';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-im-export-bpmn').addEventListener('click', () => {
  if (!_imBpmnXml) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([_imBpmnXml], { type: 'application/xml' }));
  a.download = (_logName ?? 'model').replace(/\.xes$/i, '') + '.bpmn';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ═══════════════════════════════════════════════════════════════════════════
// Inductive Miner — BPMN view
// ═══════════════════════════════════════════════════════════════════════════

const _imViewSource = {
  petri: 'Petri net · computed locally',
  bpmn:  'BPMN · requires server',
  tree:  'Process tree · coming soon',
};

function switchImView(view) {
  _imView = view;
  document.querySelectorAll('#im-view-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view)
  );
  document.getElementById('im-petri-area').classList.toggle('hidden', view !== 'petri');
  document.getElementById('im-bpmn-area').classList.toggle('hidden', view !== 'bpmn');
  document.getElementById('im-tree-area').classList.toggle('hidden', view !== 'tree');
  document.getElementById('im-view-source').textContent = _imViewSource[view] ?? '';

  if (view === 'bpmn') {
    if (_imBpmnEpoch !== _imEpoch) runImBpmn();
    else _imBpmnViewer?.get('canvas').zoom('fit-viewport');
  }
}

async function runImBpmn() {
  if (!_backendConnected) {
    document.getElementById('im-bpmn-area').textContent = 'Backend not connected.';
    return;
  }
  if (!_logFile) return;

  const area = document.getElementById('im-bpmn-area');
  area.textContent = 'Running…';

  const fd = new FormData();
  fd.append('xes_file', _logFile, 'log.xes');

  try {
    const resp = await fetch('/api/mine/inductive/bpmn', { method: 'POST', body: fd });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const { bpmn, simplicity } = await resp.json();
    _imBpmnXml        = bpmn;
    _imBpmnSimplicity = simplicity ?? null;
    document.getElementById('btn-im-export-bpmn').disabled = false;

    area.textContent = '';
    if (!_imBpmnViewer) {
      _imBpmnViewer = new BpmnJS({ container: area });
    } else {
      _imBpmnViewer.attachTo(area);
    }

    await _imBpmnViewer.importXML(bpmn);
    _imBpmnViewer.get('canvas').zoom('fit-viewport');
    _imBpmnEpoch = _imEpoch;
  } catch (e) {
    area.textContent = `Error: ${e.message}`;
  }
}

document.querySelectorAll('#im-view-tabs button').forEach(btn =>
  btn.addEventListener('click', () => switchImView(btn.dataset.view))
);

// ═══════════════════════════════════════════════════════════════════════════
// Conformance panel
// ═══════════════════════════════════════════════════════════════════════════

document.querySelectorAll('#conf-source-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    _confSource = btn.dataset.src;
    document.querySelectorAll('#conf-source-tabs button').forEach(b =>
      b.classList.toggle('active', b.dataset.src === _confSource)
    );
  });
});

function updateConformanceReady() {
  const status = document.getElementById('conf-toolbar-status');
  const btn    = document.getElementById('btn-run-conformance');
  let reason = '';
  if (!_backendConnected)                                               reason = 'Backend not connected';
  else if (!_logFile)                                                   reason = 'Load a log first';
  else if (_confSource === 'alpha' ? _alphaEpoch === -1 : _imEpoch === -1) reason = 'Run the selected miner first';
  status.textContent = reason;
  btn.disabled = !!reason;
}

function setConfContent(html) {
  document.getElementById('conf-content').innerHTML = html;
}

async function runConformance() {
  updateConformanceReady();
  if (!_backendConnected) return;
  if (!_logFile)          return;
  const netReady = _confSource === 'alpha' ? _alphaEpoch !== -1 : _imEpoch !== -1;
  if (!netReady)          return;

  const viewer = _confSource === 'alpha' ? alphaViewer : imViewer;
  setConfContent('<div class="conf-message">Running…</div>');

  const makeFormData = () => {
    const fd = new FormData();
    fd.append('xes_file', _logFile, 'log.xes');
    fd.append('net', viewer.net.toJSON());
    return fd;
  };

  try {
    const [fitnessResp, precisionResp] = await Promise.all([
      fetch('/api/conformance/fitness',   { method: 'POST', body: makeFormData() }),
      fetch('/api/conformance/precision', { method: 'POST', body: makeFormData() }),
    ]);
    if (!fitnessResp.ok)   throw new Error(`Fitness: HTTP ${fitnessResp.status}`);
    if (!precisionResp.ok) throw new Error(`Precision: HTTP ${precisionResp.status}`);
    const [fitness, precision] = await Promise.all([fitnessResp.json(), precisionResp.json()]);
    const net = viewer.net;
    const pnSimplicity = {
      nodes:      net.places.size + net.transitions.size,
      constructs: net.places.size + net.transitions.size + net.arcs.size,
    };
    const bpmnSimplicity = _confSource === 'im' ? _imBpmnSimplicity : undefined;
    renderConfResults({ ...fitness, ...precision }, pnSimplicity, bpmnSimplicity);
  } catch (e) {
    setConfContent(`<div class="conf-message">Error: ${e.message}</div>`);
  }
}

function renderConfResults(data, pnSimplicity, bpmnSimplicity) {
  const pct = v => `${Math.round(v * 100)}%`;
  const section = label =>
    `<tr class="conf-section"><td colspan="3">${label}</td></tr>`;
  const row = (label, desc, value, dim) =>
    `<tr${dim ? ' class="conf-dim"' : ''}><td>${label}</td><td>${desc}</td><td>${value}</td></tr>`;

  const bpmnPending = bpmnSimplicity === null;
  const na = '—';

  const rows = [
    section('Fitness'),
    row('Trace fitness',    'Token-based replay',                     pct(data.logFitness)),
    row('Fitting traces',   'Traces replaying without missing tokens', pct(data.percentageFittingTraces)),
    section('Precision'),
    row('Precision',        'Token-based replay',                     pct(data.precision)),
    section('Simplicity · Petri net'),
    row('Nodes',            'Places + transitions',                   pnSimplicity.nodes),
    row('Constructs',       'Nodes + arcs',                           pnSimplicity.constructs),
    ...(bpmnSimplicity !== undefined ? [
      section('Simplicity · BPMN'),
      row('Nodes',      'Tasks + gateways + events',        bpmnPending ? na : bpmnSimplicity.nodes,      bpmnPending),
      row('Constructs', 'Nodes + sequence flows',           bpmnPending ? na : bpmnSimplicity.constructs, bpmnPending),
    ] : []),
  ].join('');

  setConfContent(`<table class="conf-table"><thead><tr><th>Metric</th><th>Method</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`);
}

document.getElementById('btn-run-conformance').addEventListener('click', runConformance);

// ═══════════════════════════════════════════════════════════════════════════
// Backend status probe
// ═══════════════════════════════════════════════════════════════════════════

async function checkBackendStatus() {
  const el = document.getElementById('backend-status');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 2000);
    const resp = await fetch('/api/status', { signal: controller.signal });
    clearTimeout(timeout);
    if (resp.ok) {
      const data = await resp.json();
      _backendConnected = true;
      el.className = 'connected';
      el.title = `Backend connected · pm4py ${data.pm4py}`;
    } else {
      _backendConnected = false;
      el.className = 'disconnected';
      el.title = `Backend error (HTTP ${resp.status})`;
    }
  } catch {
    _backendConnected = false;
    el.className = 'disconnected';
    el.title = 'Backend not reachable';
  }
  updateConformanceReady();
}

// ═══════════════════════════════════════════════════════════════════════════
// Initialise
// ═══════════════════════════════════════════════════════════════════════════

checkBackendStatus();
loadXes('example');      // auto-load the running example so the app feels alive
</script>
