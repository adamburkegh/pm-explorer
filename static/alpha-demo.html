<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alpha Miner Demo</title>
  <link rel="stylesheet" href="js/pnv/pnv.css">
  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif; }
    body { display: flex; flex-direction: column; }

    #toolbar {
      padding: 8px 12px; background: #f5f5f5; border-bottom: 1px solid #ddd;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    #toolbar strong { font-size: 1em; }
    #toolbar button {
      padding: 4px 10px; cursor: pointer; border: 1px solid #ccc;
      background: #fff; border-radius: 4px;
    }
    #toolbar button:hover { background: #e8e8e8; }
    #toolbar button.primary {
      background: #4682b4; color: #fff; border-color: #4682b4;
    }
    #toolbar button.primary:hover { background: #376897; }
    #toolbar label { cursor: pointer; }
    #file-input { display: none; }

    #stats {
      font-size: 0.82em; color: #555; padding: 2px 0;
      display: flex; gap: 16px;
    }
    #stats span { white-space: nowrap; }
    #stats b { color: #333; }

    #msg { color: #c00; font-size: 0.85em; margin-left: auto; }

    #container { flex: 1; }
  </style>
</head>
<body>

<div id="toolbar">
  <strong>Alpha Miner</strong>

  <button id="btn-example" class="primary">Load running example</button>

  <label id="lbl-file">
    <button onclick="document.getElementById('file-input').click()">Load XES file…</button>
    <input type="file" id="file-input" accept=".xes">
  </label>

  <button id="btn-fit">Fit view</button>
  <button id="btn-reset">Reset marking</button>

  <div id="stats"></div>
  <span id="msg"></span>
</div>

<div id="container" class="pnv-container">
  <canvas id="canvas" class="pnv-canvas"></canvas>
</div>

<!-- Event log layer -->
<script src="js/eventlog/constants.js"></script>
<script src="js/eventlog/event-log.js"></script>
<script src="js/eventlog/xes-parser.js"></script>
<script src="js/eventlog/log-util.js"></script>

<!-- Discovery -->
<script src="js/discovery/alpha-miner.js"></script>

<!-- PNV layer -->
<script src="js/pnv/model.js"></script>
<script src="js/pnv/renderer.js"></script>
<script src="js/pnv/viewer.js"></script>

<!-- Bundled running-example fixture (no fetch required) -->
<script src="test/fixtures/running-example-xes.js"></script>

<script>
// ── Simple BFS layout ─────────────────────────────────────────────────────────
//
// Assigns x/y positions to all nodes in a PetriNet based on graph distance
// from the source place, producing a readable left-to-right layered layout.
//
function layoutNet(net, sourceId) {
  const rank = new Map();
  const queue = [sourceId];
  rank.set(sourceId, 0);

  let head = 0;
  while (head < queue.length) {
    const nodeId = queue[head++];
    const r = rank.get(nodeId);
    for (const arc of net.arcs.values()) {
      if (arc.source === nodeId && !rank.has(arc.target)) {
        rank.set(arc.target, r + 1);
        queue.push(arc.target);
      }
    }
  }

  // Any nodes not reachable from source get rank = max + 1
  if (rank.size > 0) {
    const maxR = Math.max(...rank.values());
    for (const id of [...net.places.keys(), ...net.transitions.keys()]) {
      if (!rank.has(id)) rank.set(id, maxR + 1);
    }
  }

  // Group by rank
  const byRank = new Map();
  for (const [id, r] of rank) {
    if (!byRank.has(r)) byRank.set(r, []);
    byRank.get(r).push(id);
  }

  // Assign positions: x by rank, y centred within each column
  const X_GAP = 160, Y_GAP = 90;
  const maxInCol = Math.max(...[...byRank.values()].map(ids => ids.length), 1);
  const canvasH = maxInCol * Y_GAP;

  for (const [r, ids] of byRank) {
    const groupH = ids.length * Y_GAP;
    const startY = (canvasH - groupH) / 2 + Y_GAP / 2;
    ids.forEach((id, i) => {
      const node = net.places.get(id) || net.transitions.get(id);
      if (node) node.position = { x: 80 + r * X_GAP, y: startY + i * Y_GAP };
    });
  }
}

// ── State ─────────────────────────────────────────────────────────────────────

let _initialTokens = null; // Map<placeId, number> — snapshot for reset

function saveInitialMarking(net) {
  _initialTokens = new Map();
  for (const [id, place] of net.places) {
    _initialTokens.set(id, place.tokens);
  }
}

function restoreInitialMarking(net) {
  if (!_initialTokens) return;
  for (const [id, tokens] of _initialTokens) {
    const p = net.places.get(id);
    if (p) p.tokens = tokens;
  }
}

// ── Viewer setup ──────────────────────────────────────────────────────────────

const viewer = new PetriNetViewer(document.getElementById('canvas'), {
  interactive: true,
  onFire: (_id, _t, net) => {
    net.updateEnabledTransitions();
    viewer.render();
  },
});

function displayNet(result) {
  const { net, source } = result;
  layoutNet(net, source.id);
  net.updateEnabledTransitions();
  saveInitialMarking(net);
  viewer.load(net);

  // Stats bar
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = [
    `<span><b>${net.transitions.size}</b> transitions</span>`,
    `<span><b>${net.places.size}</b> places</span>`,
    `<span><b>${net.arcs.size}</b> arcs</span>`,
  ].join('');
  document.getElementById('msg').textContent = '';
}

function showError(text) {
  document.getElementById('msg').textContent = text;
}

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('btn-example').addEventListener('click', () => {
  try {
    const log = xesParser.parse(RUNNING_EXAMPLE_XES);
    displayNet(applyAlphaMiner(log));
  } catch (e) {
    showError('Error: ' + e.message);
  }
});

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('msg').textContent = 'Parsing…';
  try {
    const log = await xesParser.parseFile(file);
    displayNet(applyAlphaMiner(log));
  } catch (err) {
    showError('Error: ' + err.message);
  }
  // Reset so the same file can be reloaded
  e.target.value = '';
});

document.getElementById('btn-fit').addEventListener('click', () => {
  viewer.fitView();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  const net = viewer.net;
  if (!net) return;
  restoreInitialMarking(net);
  net.updateEnabledTransitions();
  viewer.render();
});

// ── Auto-load the running example on page open ────────────────────────────────
(function () {
  try {
    const log = xesParser.parse(RUNNING_EXAMPLE_XES);
    displayNet(applyAlphaMiner(log));
  } catch (e) {
    showError('Could not auto-load example: ' + e.message);
  }
})();
</script>
</body>
</html>
